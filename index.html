<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Extras - Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --background: #f8fafc;
            --text: #1e293b;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--background); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--primary); font-size: 1.8rem; margin-bottom: 30px; }
        .card-form { background: #ffffff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 0.85rem; font-weight: 600; color: var(--secondary); }
        .field input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
        .actions-bar { display: flex; gap: 10px; margin-bottom: 25px; }
        button { border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: var(--primary); color: white; flex: 2; }
        .btn-print { background: var(--secondary); color: white; flex: 1; }
        .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 0.85rem; color: var(--secondary); }
        td { padding: 15px; border-top: 1px solid #f1f5f9; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .badge-pending { background: #fee2e2; color: #b91c1c; }
        .badge-success { background: #dcfce7; color: #15803d; }
        .footer-summary { margin-top: 25px; padding: 20px; background: var(--text); color: white; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .total-price { font-size: 1.8rem; font-weight: bold; color: #4ade80; }
        .btn-row-action { display: flex; gap: 5px; }
        .btn-del { background: #fee2e2; color: var(--danger); padding: 8px; border-radius: 6px; }
        .btn-ok { background: #dcfce7; color: var(--success); padding: 8px; border-radius: 6px; }
        @media print { .card-form, .actions-bar, .btn-row-action { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Atividades Extras</h2>

    <div class="card-form">
        <div class="field"><label>📅 Data</label><input type="date" id="dataE"></div>
        <div class="field"><label>🏢 Local</label><input type="text" id="emp" placeholder="Empreendimento"></div>
        <div class="field"><label>👤 Supervisor</label><input type="text" id="sup" placeholder="Nome"></div>
        <div class="field"><label>🛠️ Função</label><input type="text" id="fun"></div>
        <div class="field"><label>💰 Valor</label><input type="number" id="val" step="0.01"></div>
        <div class="field"><label>⏳ Previsão</label><input type="date" id="prev"></div>
    </div>

    <div class="actions-bar">
        <button id="btnSalvar" class="btn-save" onclick="adicionar()">+ SALVAR REGISTRO NO EXTRAS</button>
        <button class="btn-print" onclick="window.print()">📄 RELATÓRIO PDF</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Data</th><th>Local</th><th>Supervisor</th><th>Função</th><th>Previsão</th><th>Valor</th><th>Status</th><th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <div class="footer-summary">
        <div>
            <span style="font-size: 0.8rem; opacity: 0.7;">VALOR TOTAL RECEBIDO</span><br>
            <span id="pendingText" style="color: #f87171; font-size: 0.9rem;">Pendente: R$ 0.00</span>
        </div>
        <span class="total-price">R$ <span id="totalDisplay">0.00</span></span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    // --- CONFIGURAÇÃO ATUALIZADA DO PROJETO EXTRAS ---
    const firebaseConfig = {
      apiKey: "AIzaSyC1am_JtUQrkoMdBmfv6JDWvLzQBuLrvps",
      authDomain: "extras-13c06.firebaseapp.com",
      projectId: "extras-13c06",
      storageBucket: "extras-13c06.firebasestorage.app",
      messagingSenderId: "634892180874",
      appId: "1:634892180874:web:51a459c181dede8f5ebc73"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const formatarData = (d) => d ? d.split('-').reverse().join('/') : '-';

    window.adicionar = async function() {
        const d = {
            dataE: document.getElementById('dataE').value,
            emp: document.getElementById('emp').value,
            sup: document.getElementById('sup').value,
            fun: document.getElementById('fun').value,
            val: parseFloat(document.getElementById('val').value) || 0,
            prev: document.getElementById('prev').value,
            pago: false,
            timestamp: new Date().getTime()
        };

        if(!d.dataE || d.val <= 0) return alert("Preencha Data e Valor!");

        try {
            await addDoc(collection(db, "trabalhos_extras"), d);
            document.getElementById('fun').value = '';
            document.getElementById('val').value = '';
        } catch (e) {
            alert("Erro ao salvar! Verifique as regras no Firebase.");
        }
    }

    window.alternar = async (id, status) => await updateDoc(doc(db, "trabalhos_extras", id), { pago: !status });
    window.excluir = async (id) => confirm("Excluir registro?") && await deleteDoc(doc(db, "trabalhos_extras", id));

    onSnapshot(query(collection(db, "trabalhos_extras"), orderBy("dataE", "desc")), (snap) => {
        const lista = document.getElementById('lista');
        lista.innerHTML = '';
        let recebido = 0, pendente = 0;

        snap.forEach((doc) => {
            const item = doc.data();
            const id = doc.id;
            item.pago ? recebido += item.val : pendente += item.val;

            lista.innerHTML += `
                <tr>
                    <td>${formatarData(item.dataE)}</td>
                    <td>${item.emp}</td>
                    <td>${item.sup}</td>
                    <td>${item.fun}</td>
                    <td>${formatarData(item.prev)}</td>
                    <td style="font-weight:600">R$ ${item.val.toFixed(2)}</td>
                    <td><span class="badge ${item.pago ? 'badge-success' : 'badge-pending'}">${item.pago ? 'OK' : 'PENDENTE'}</span></td>
                    <td>
                        <div class="btn-row-action">
                            <button class="btn-ok" onclick="alternar('${id}', ${item.pago})">✔</button>
                            <button class="btn-del" onclick="excluir('${id}')">✖</button>
                        </div>
                    </td>
                </tr>`;
        });
        document.getElementById('totalDisplay').innerText = recebido.toFixed(2);
        document.getElementById('pendingText').innerText = `Pendente: R$ ${pendente.toFixed(2)}`;
    });
</script>
</body>
</html>
